<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>咖啡拉花畫布工具</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0ebe3; min-height: 100vh; overflow-x: hidden; }

        #topBar {
            background: #2c1810; color: #f5efe6; padding: 8px 16px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 200;
        }
        #topBar h1 { font-size: 1rem; font-weight: 700; letter-spacing: 2px; }
        #topBar h1 span { color: #c8956c; }
        #fullscreenBtn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: #f5efe6; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
        }

        #mainLayout { display: flex; height: calc(100vh - 42px); overflow: hidden; }

        /* 左側工具欄 */
        #toolbar {
            width: 190px; min-width: 190px; background: #5c3d2e;
            display: flex; flex-direction: column; overflow-y: auto; padding: 10px 8px;
        }
        .tb-section { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px; margin-bottom: 8px; }
        .tb-label { font-size: 0.6rem; color: rgba(245,239,230,0.55); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; display: block; }
        .tool-btn {
            width: 100%; padding: 7px 10px; margin-bottom: 4px;
            border: 1.5px solid rgba(245,239,230,0.2); border-radius: 6px;
            background: rgba(255,255,255,0.08); color: #f5efe6; font-size: 0.8rem;
            cursor: pointer; text-align: left;
        }
        .tool-btn.active { background: #c8956c; border-color: #c8956c; }
        #colorPickerLabel {
            display: block; width: 100%; height: 34px; border-radius: 6px;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.25); cursor: pointer;
        }
        #colorPicker { width: 100%; height: 100%; border: none; padding: 0; cursor: pointer; }
        #colorHex { font-size: 0.68rem; color: rgba(245,239,230,0.6); text-align: center; margin-top: 3px; font-family: monospace; }
        .quick-colors { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-top: 5px; }
        .qc { aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); }
        .qc:hover { transform: scale(1.15); border-color: white; }
        .size-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; margin-bottom: 5px; }
        .size-btn {
            padding: 5px; border: 1.5px solid rgba(245,239,230,0.2); border-radius: 5px;
            background: rgba(255,255,255,0.08); color: #f5efe6; font-size: 0.75rem; cursor: pointer; text-align: center;
        }
        .size-btn.active { background: #c8956c; border-color: #c8956c; }
        .ratio-row { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid rgba(245,239,230,0.2); }
        .ratio-btn { flex: 1; padding: 6px 4px; font-size: 0.73rem; background: transparent; color: rgba(245,239,230,0.6); border: none; cursor: pointer; text-align: center; }
        .ratio-btn.active { background: #c8956c; color: white; }

        /* ===== 中間畫布區 =====
           完全照原始：外層容器 position:relative，flex 置中
           canvas 和 imageOverlay 都是 position:absolute
        */
        #canvasArea {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        /* 這個 div 是 canvas.parentElement，updateCanvasAndImagePosition 讀它的尺寸 */
        #canvasWrap {
            position: absolute;
            inset: 0;
        }
        #canvasBoard {
            position: absolute;
            z-index: 0;
            background: white;
            box-shadow: 0 4px 24px rgba(44,24,16,0.25);
            pointer-events: none;
            border-radius: 2px;
        }
        #drawingCanvas {
            position: absolute;
            z-index: 2;
            cursor: crosshair;
            background: transparent;
        }
        #imageOverlay {
            position: absolute;
            opacity: 0.5;
            display: none;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
            transform-origin: center center;
        }
        /* 清除彈窗 */
        #clearOverlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 50;
            align-items: center; justify-content: center;
        }
        #clearOverlay.show { display: flex; }
        #clearDialog { background: white; border-radius: 10px; padding: 20px 24px; text-align: center; }
        #clearDialog p { margin-bottom: 14px; font-size: 0.9rem; color: #2c1810; }
        #clearDialog .btn-row { display: flex; gap: 8px; justify-content: center; }
        #clearDialog button { padding: 7px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.82rem; color: white; }
        .btn-yes { background: #e74c3c; } .btn-no { background: #95a5a6; }

        /* 右側控制欄 */
        #controls {
            width: 210px; min-width: 210px; background: #faf3e8;
            border-left: 1px solid rgba(44,24,16,0.1);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .ctrl-section { padding: 10px 12px; border-bottom: 1px solid rgba(44,24,16,0.08); }
        .ctrl-title { font-size: 0.62rem; font-weight: 700; color: #8b6355; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .ai-section { background: linear-gradient(135deg, #2c1810, #5c3d2e); color: #f5efe6; }
        .ai-section .ctrl-title { color: #c8956c; }
        .ai-prompt { width: 100%; padding: 7px 8px; border: 1px solid rgba(245,239,230,0.2); border-radius: 6px; background: rgba(255,255,255,0.1); color: #f5efe6; font-size: 0.78rem; font-family: inherit; resize: vertical; min-height: 65px; }
        .ai-prompt::placeholder { color: rgba(245,239,230,0.4); }
        .style-chips { display: flex; flex-wrap: wrap; gap: 3px; margin: 6px 0; }
        .chip { padding: 2px 7px; border: 1px solid rgba(200,149,108,0.4); border-radius: 20px; font-size: 0.68rem; color: rgba(245,239,230,0.75); cursor: pointer; background: transparent; }
        .chip.active { background: #c8956c; border-color: #c8956c; color: white; }
        .ai-opt-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: rgba(245,239,230,0.7); margin-bottom: 5px; }
        .ai-select { padding: 2px 5px; border: 1px solid rgba(245,239,230,0.2); border-radius: 4px; background: rgba(255,255,255,0.1); color: #f5efe6; font-size: 0.7rem; cursor: pointer; }
        .btn-generate { width: 100%; padding: 9px; background: #c8956c; border: none; border-radius: 7px; color: white; font-size: 0.82rem; font-weight: 700; cursor: pointer; margin-top: 4px; }
        .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
        #aiStatus { font-size: 0.68rem; color: rgba(245,239,230,0.6); text-align: center; margin-top: 5px; min-height: 16px; }
        #aiPreview { width: 100%; border-radius: 5px; border: 1px solid rgba(245,239,230,0.2); margin-top: 7px; display: none; max-height: 110px; object-fit: cover; }
        #aiImportBtn { width: 100%; padding: 6px; background: rgba(200,149,108,0.25); border: 1px solid rgba(200,149,108,0.5); border-radius: 5px; color: #f5efe6; font-size: 0.74rem; cursor: pointer; margin-top: 5px; display: none; }
        .ctrl-btn { width: 100%; padding: 7px 8px; margin-bottom: 4px; border: 1.5px solid rgba(44,24,16,0.15); border-radius: 6px; background: white; color: #2c1810; font-size: 0.78rem; cursor: pointer; text-align: left; }
        .ctrl-btn:hover { background: #f5efe6; border-color: #c8956c; }
        .upload-label { display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; padding: 8px; border: 1.5px dashed rgba(44,24,16,0.25); border-radius: 6px; cursor: pointer; font-size: 0.78rem; color: #8b6355; background: rgba(255,255,255,0.7); margin-bottom: 6px; }
        .upload-label:hover { border-color: #c8956c; color: #c8956c; }
        .opacity-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .opacity-row label { font-size: 0.7rem; color: #8b6355; min-width: 30px; }
        .opacity-row input[type=range] { flex: 1; accent-color: #c8956c; }
        .opacity-row span { font-size: 0.7rem; color: #5c3d2e; min-width: 30px; text-align: right; }
        .img-ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-bottom: 4px; }
        .img-ctrl-btn { padding: 5px; border: 1px solid rgba(44,24,16,0.15); border-radius: 5px; background: white; color: #5c3d2e; font-size: 0.72rem; cursor: pointer; text-align: center; }
        .img-ctrl-btn:hover { background: #f5efe6; }
        .move-pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin: 3px 0; }
        .move-btn { padding: 6px; border: 1px solid rgba(44,24,16,0.15); border-radius: 5px; background: white; color: #5c3d2e; font-size: 0.8rem; cursor: pointer; text-align: center; }
        .move-btn:hover { background: #f5efe6; }
        .move-ph { background: transparent !important; border: none !important; cursor: default !important; }
        .save-btn { width: 100%; padding: 8px; margin-bottom: 5px; border: none; border-radius: 6px; color: white; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
        .save-btn.white-bg { background: #4a7c59; } .save-btn.trans-bg { background: #c8956c; }
        .latte-btn { display: block; width: 100%; padding: 8px; margin-bottom: 5px; border: none; border-radius: 6px; color: white; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
        .latte-btn.color { background: #9c27b0; } .latte-btn.bw { background: #607d8b; }

        /* Drive 圖片選取浮動視窗 */
        #driveBrowserOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 500;
            align-items: center; justify-content: center;
        }
        #driveBrowserOverlay.show { display: flex; }
        #driveBrowserDialog {
            background: white; border-radius: 12px;
            width: 600px; max-width: 92vw; max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.35);
        }
        #driveBrowserHeader {
            background: #2c1810; color: #f5efe6;
            padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
        }
        #driveBrowserHeader h3 { font-size: 0.9rem; margin: 0; }
        #driveBrowserClose {
            background: none; border: none; color: #f5efe6;
            font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 0 4px;
        }
        #driveBrowserGrid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding: 12px; overflow-y: auto; flex: 1;
        }
        .drive-thumb {
            aspect-ratio: 1; border-radius: 6px; overflow: hidden;
            cursor: pointer; border: 2px solid transparent;
            transition: border-color 0.15s, transform 0.15s;
            background: #f0ebe3; position: relative;
        }
        .drive-thumb:hover { border-color: #c8956c; transform: scale(1.03); }
        .drive-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .drive-thumb-name {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.55); color: white;
            font-size: 0.6rem; padding: 3px 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #driveBrowserStatus {
            padding: 8px 12px; font-size: 0.75rem; color: #8b6355;
            border-top: 1px solid rgba(44,24,16,0.08); text-align: center; min-height: 36px;
        } transform: translateX(-50%) translateY(80px); background: #2c1810; color: #f5efe6; padding: 9px 20px; border-radius: 20px; font-size: 0.82rem; z-index: 9999; transition: transform 0.25s ease; pointer-events: none; white-space: nowrap; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }

        /* ── 側欄收合 ── */
        #toolbar, #controls {
            transition: width 0.25s ease, min-width 0.25s ease;
            position: relative;
            flex-shrink: 0;
        }
        #toolbar.collapsed  { width: 0 !important; min-width: 0 !important; }
        #controls.collapsed { width: 0 !important; min-width: 0 !important; }

        /* 收合時隱藏內容但不裁切按鈕 */
        #toolbar.collapsed  .tb-section,
        #toolbar.collapsed  > *:not(.panel-toggle) { opacity: 0; pointer-events: none; }
        #controls.collapsed .ctrl-section,
        #controls.collapsed > *:not(.panel-toggle) { opacity: 0; pointer-events: none; }

        /* 收合按鈕（突出在側欄外緣） */
        .panel-toggle {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 20px; height: 52px;
            background: #5c3d2e; color: #f5efe6;
            border: none; cursor: pointer; z-index: 400;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem;
            box-shadow: 2px 0 8px rgba(0,0,0,0.3);
            transition: background 0.15s;
        }
        .panel-toggle:hover { background: #c8956c; }
        #toolbarToggle  { right: -20px; border-radius: 0 8px 8px 0; }
        #controlsToggle { left: -20px;  border-radius: 8px 0 0 8px; background: #8b6355; box-shadow: -2px 0 8px rgba(0,0,0,0.3); }
        #controlsToggle:hover { background: #c8956c; }

        /* 收合後邊緣召回條 */
        .panel-recall {
            position: fixed; top: 50%; transform: translateY(-50%);
            width: 16px; height: 56px;
            background: rgba(92,61,46,0.85); color: #f5efe6;
            border: none; cursor: pointer; z-index: 500;
            display: none; align-items: center; justify-content: center;
            font-size: 0.65rem;
            backdrop-filter: blur(4px);
            transition: background 0.15s;
        }
        .panel-recall:hover { background: #c8956c; }
        #toolbarRecall  { left: 0;  border-radius: 0 8px 8px 0; }
        #controlsRecall { right: 0; border-radius: 8px 0 0 8px; }

        @media (max-width: 800px) {
            #mainLayout { flex-direction: column; height: auto; }
            #toolbar { width: 100% !important; min-width: 0 !important; flex-direction: row; flex-wrap: wrap; padding: 8px !important; }
            .tb-section { min-width: 140px; }
            #canvasArea { min-height: 55vw; flex: none; height: 60vw; }
            #controls { width: 100% !important; min-width: 0 !important; }
            .panel-toggle, .panel-recall { display: none !important; }
        }
    </style>
</head>
<body>

<div id="topBar">
    <h1>☕ 咖啡<span>拉花</span>畫布工具</h1>
    <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶ 全螢幕</button>
</div>

<div id="mainLayout">

    <div id="toolbar">
        <button class="panel-toggle" id="toolbarToggle" onclick="togglePanel('toolbar')" title="收合工具欄">◀</button>
        <div class="tb-section">
            <span class="tb-label">畫布比例</span>
            <div class="ratio-row">
                <button class="ratio-btn"        id="btnSquare" onclick="setRatio('square')">正方形</button>
                <button class="ratio-btn active" id="btnRect"   onclick="setRatio('rect')">長方形</button>
            </div>
        </div>
        <div class="tb-section">
            <span class="tb-label">工具</span>
            <button class="tool-btn active" id="btnPen"    onclick="setTool('pen')">✏️ 畫筆</button>
            <button class="tool-btn"        id="btnEraser" onclick="setTool('eraser')">🧹 橡皮擦</button>
            <button class="tool-btn"        id="btnFill"   onclick="setTool('fill')">🪣 填色</button>
            <button class="tool-btn"                       onclick="undo()">↩️ 回復</button>
            <button class="tool-btn"                       onclick="showClear()" style="color:#ff9090;">🗑️ 清除</button>
        </div>
        <div class="tb-section">
            <span class="tb-label">顏色</span>
            <label id="colorPickerLabel" for="colorPicker">
                <input type="color" id="colorPicker" value="#000000" oninput="pickColor(this.value)">
            </label>
            <div id="colorHex">#000000</div>
            <div class="quick-colors">
                <div class="qc" style="background:#000000" onclick="pickColor('#000000')"></div>
                <div class="qc" style="background:#ffffff;border-color:rgba(0,0,0,0.3)" onclick="pickColor('#ffffff')"></div>
                <div class="qc" style="background:#e53935" onclick="pickColor('#e53935')"></div>
                <div class="qc" style="background:#1e88e5" onclick="pickColor('#1e88e5')"></div>
                <div class="qc" style="background:#43a047" onclick="pickColor('#43a047')"></div>
                <div class="qc" style="background:#fb8c00" onclick="pickColor('#fb8c00')"></div>
                <div class="qc" style="background:#8e24aa" onclick="pickColor('#8e24aa')"></div>
                <div class="qc" style="background:#fdd835" onclick="pickColor('#fdd835')"></div>
                <div class="qc" style="background:#f48fb1" onclick="pickColor('#f48fb1')"></div>
                <div class="qc" style="background:#8d6e63" onclick="pickColor('#8d6e63')"></div>
            </div>
        </div>
        <div class="tb-section">
            <span class="tb-label">筆刷大小</span>
            <div class="size-grid">
                <button class="size-btn"        data-size="3"  onclick="setSize(this)">S (3)</button>
                <button class="size-btn active" data-size="8"  onclick="setSize(this)">M (8)</button>
                <button class="size-btn"        data-size="15" onclick="setSize(this)">L (15)</button>
                <button class="size-btn"        data-size="25" onclick="setSize(this)">XL(25)</button>
                <button class="size-btn"        data-size="40" onclick="setSize(this)">2X(40)</button>
                <button class="size-btn"        data-size="60" onclick="setSize(this)">3X(60)</button>
            </div>
            <div style="display:flex;align-items:center;gap:4px;">
                <span style="font-size:0.68rem;color:rgba(245,239,230,0.6);">自訂:</span>
                <input type="number" id="customSize" min="1" max="200" placeholder="px"
                    style="width:50px;padding:3px 5px;border:1px solid rgba(245,239,230,0.2);border-radius:4px;background:rgba(255,255,255,0.1);color:#f5efe6;font-size:0.72rem;text-align:center;"
                    oninput="setCustomSize(this.value)">
                <span style="font-size:0.68rem;color:rgba(245,239,230,0.6);">px</span>
            </div>
        </div>
    </div>

    <!-- Google Drive 圖片選取浮動視窗 -->
    <div id="driveBrowserOverlay">
        <div id="driveBrowserDialog">
            <div id="driveBrowserHeader">
                <h3>☁️ 選取 Google Drive 圖片</h3>
                <button id="driveBrowserClose" onclick="closeDriveBrowser()">✕</button>
            </div>
            <div id="driveBrowserGrid"></div>
            <div id="driveBrowserStatus">載入中...</div>
        </div>
    </div>

    <!-- 中間畫布區 -->
    <div id="canvasArea">
        <!-- 清除確認 -->
        <div id="clearOverlay">
            <div id="clearDialog">
                <p>🗑️ 確定要清除畫布嗎？</p>
                <div class="btn-row">
                    <button class="btn-yes" onclick="doClear()">清除</button>
                    <button class="btn-no"  onclick="hideClear()">取消</button>
                </div>
            </div>
        </div>
        <!--
            canvasWrap = canvas.parentElement
            完全照原始：position-relative, w-100, h-100, flex 置中
            canvas 和 imageOverlay 都是 position:absolute
        -->
        <div id="canvasWrap">
            <div id="canvasBoard" aria-hidden="true"></div>
            <img id="imageOverlay" alt="參考圖片">
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <!-- 右側控制欄 -->
    <div id="controls">
        <button class="panel-toggle" id="controlsToggle" onclick="togglePanel('controls')" title="收合控制欄">▶</button>

        <!-- ① 匯入方式（共用） -->
        <div class="ctrl-section" style="background:#fff8f0;border-left:3px solid #c8956c;">
            <div class="ctrl-title">↙ 匯入方式（共用）</div>
            <select id="aiMode" onchange="updateAiImportLabel()"
                style="width:100%;padding:6px 8px;border:1.5px solid rgba(44,24,16,0.15);border-radius:6px;font-size:0.78rem;color:#2c1810;background:white;cursor:pointer;">
                <option value="overlay">📌 參考底圖</option>
                <option value="draw">🖼 置入畫布</option>
            </select>
            <div style="font-size:0.63rem;color:#a07060;margin-top:4px;">套用至：本機上傳 / AI 生圖 / 雲端硬碟</div>
        </div>

        <!-- ② AI 生圖 -->
        <div class="ctrl-section ai-section">
            <div class="ctrl-title">✨ AI 生圖</div>
            <textarea class="ai-prompt" id="aiPrompt" placeholder="輸入圖片描述...&#10;例如：a cute cat, minimalist"></textarea>
            <div class="style-chips">
                <button class="chip" onclick="toggleChip(this,'line art')">線稿</button>
                <button class="chip" onclick="toggleChip(this,'black and white')">黑白</button>
                <button class="chip" onclick="toggleChip(this,'minimalist')">極簡</button>
                <button class="chip" onclick="toggleChip(this,'watercolor')">水彩</button>
                <button class="chip" onclick="toggleChip(this,'sketch')">素描</button>
                <button class="chip" onclick="toggleChip(this,'floral')">花卉</button>
            </div>
            <div class="ai-opt-row">
                <span>比例</span>
                <select class="ai-select" id="aiAspect">
                    <option value="1:1">1:1 正方</option>
                    <option value="9:16">9:16 直式</option>
                    <option value="16:9">16:9 橫式</option>
                    <option value="3:4">3:4</option>
                </select>
            </div>
            <button class="btn-generate" id="generateBtn" onclick="generateImage()">🎨 生成圖片</button>
            <div id="aiStatus"></div>
            <img id="aiPreview" alt="AI 預覽">

        <div class="ctrl-section">

            <button class="save-btn trans-bg" onclick="saveTrans()">◻ 透明背景存檔</button>

        <div class="ctrl-section">
            <div class="ctrl-title">☕ 上傳至拉花機</div>
            <a class="latte-btn color" href="http://fw.evebot.cc/?#/en/select_ws?id=215984" target="_blank">🎨 彩色拉花</a>
            <a class="latte-btn bw"    href="http://fw.evebot.cc/?#/en/select_ws?id=209086" target="_blank">⬛ 黑白拉花</a>

            Made by <a href="https://smart.ylc.edu.tw/" target="_blank" style="color:#c8956c;text-decoration:none;">雲林智慧教育中心</a>

<div id="toast"></div>
<!-- 邊緣召回條 -->
<button class="panel-recall" id="toolbarRecall"  onclick="togglePanel('toolbar')"  title="展開工具欄">▶</button>
<button class="panel-recall" id="controlsRecall" onclick="togglePanel('controls')" title="展開控制欄">◀</button>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwvn9IYYG_zqFNc0xtIcJgMYmqLMbHFAmx7VoYf4u1gBecbmfU8EwAllBepeX8-aoNBsw/exec';

// 元素
var canvas  = document.getElementById('drawingCanvas');
var ctx     = canvas.getContext('2d');
var imageOverlay = document.getElementById('imageOverlay');
var canvasBoard  = document.getElementById('canvasBoard');

// 狀態 — 完全照原始命名
var drawing      = false;
var isPenActive    = true;
var isEraserActive = false;
var isFillActive   = false;
var isImageVisible = false;
var historyStack   = [];
var imageScale  = 1;
var imageX      = 0;
var imageY      = 0;
var imageRotation = 0;
var currentCanvasSize = { width: 650, height: Math.round(650 * 5/3.8) };

var activeChips = [];
var aiImageData = null;

// ── 初始化 ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
    canvas.width  = currentCanvasSize.width;
    canvas.height = currentCanvasSize.height;
    initCtx();
    updateCanvasAndImagePosition();
    updateAiImportLabel();
    window.addEventListener('resize', updateCanvasAndImagePosition);
});

function initCtx() {
    ctx.strokeStyle = document.getElementById('colorPicker').value;
    ctx.lineWidth   = 8;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.globalCompositeOperation = 'source-over';
}

// ── 核心：顯示尺寸 / 位置同步 ─────────────────────
function updateCanvasAndImagePosition() {
    var container = canvas.parentElement;  // = #canvasWrap
    var containerWidth  = container.offsetWidth;
    var containerHeight = container.offsetHeight;

    var scaleX = containerWidth  / currentCanvasSize.width;
    var scaleY = containerHeight / currentCanvasSize.height;
    var scale  = Math.min(scaleX, scaleY, 1);

    var displayWidth  = currentCanvasSize.width  * scale;
    var displayHeight = currentCanvasSize.height * scale;
    var baseLeft = (containerWidth  - displayWidth)  / 2;
    var baseTop  = (containerHeight - displayHeight) / 2;

    canvasBoard.style.width  = displayWidth + 'px';
    canvasBoard.style.height = displayHeight + 'px';
    canvasBoard.style.left   = baseLeft + 'px';
    canvasBoard.style.top    = baseTop + 'px';

    canvas.style.width  = displayWidth + 'px';
    canvas.style.height = displayHeight + 'px';
    canvas.style.left   = baseLeft + 'px';
    canvas.style.top    = baseTop + 'px';

    if (imageOverlay.src && imageOverlay.src !== window.location.href) {
        var overlayWidth  = displayWidth * imageScale;
        var overlayHeight = displayHeight * imageScale;
        var overlayLeft   = baseLeft + (displayWidth  - overlayWidth)  / 2 + imageX;
        var overlayTop    = baseTop  + (displayHeight - overlayHeight) / 2 + imageY;

        imageOverlay.style.width  = overlayWidth + 'px';
        imageOverlay.style.height = overlayHeight + 'px';
        imageOverlay.style.left   = overlayLeft + 'px';
        imageOverlay.style.top    = overlayTop + 'px';
        imageOverlay.style.transform = 'rotate(' + imageRotation + 'deg)';
        imageOverlay.style.zIndex = '1';
        canvas.style.zIndex = '2';
    }
}

// ── 比例 ──────────────────────────────────────────
function setRatio(r) {
    var saved = null;
    try { saved = ctx.getImageData(0, 0, canvas.width, canvas.height); } catch(e) {}
    if (r === 'square') {
        currentCanvasSize = { width: 650, height: 650 };
    } else {
        currentCanvasSize = { width: 650, height: Math.round(650 * 5/3.8) };
    }
    canvas.width  = currentCanvasSize.width;
    canvas.height = currentCanvasSize.height;
    initCtx();
    if (saved) try { ctx.putImageData(saved, 0, 0); } catch(e) {}
    document.getElementById('btnSquare').classList.toggle('active', r === 'square');
    document.getElementById('btnRect').classList.toggle('active',   r === 'rect');
    updateCanvasAndImagePosition();
}

// ── 工具 ──────────────────────────────────────────
function setTool(t) {
    isPenActive    = (t === 'pen');
    isEraserActive = (t === 'eraser');
    isFillActive   = (t === 'fill');
    document.getElementById('btnPen').classList.toggle('active',    isPenActive);
    document.getElementById('btnEraser').classList.toggle('active', isEraserActive);
    document.getElementById('btnFill').classList.toggle('active',   isFillActive);
    canvas.style.cursor = isFillActive ? 'cell' : 'crosshair';
    if (isEraserActive) {
        ctx.globalCompositeOperation = 'destination-out';
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = document.getElementById('colorPicker').value;
    }
}

function pickColor(hex) {
    document.getElementById('colorPicker').value = hex;
    document.getElementById('colorHex').textContent = hex.toUpperCase();
    if (!isEraserActive) ctx.strokeStyle = hex;
    if (isEraserActive || isFillActive) setTool('pen');
}

function setSize(btn) {
    document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    ctx.lineWidth = parseInt(btn.dataset.size);
    document.getElementById('customSize').value = '';
}

function setCustomSize(val) {
    var v = parseInt(val);
    if (v > 0 && v <= 200) {
        ctx.lineWidth = v;
        document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('active'); });
    }
}

// ── 繪圖 ── 完全照原始 ──────────────────────────────
function startDrawing(e) {
    var rect   = canvas.getBoundingClientRect();
    var scaleX = canvas.width  / rect.width;
    var scaleY = canvas.height / rect.height;
    if (isFillActive) {
        saveCanvasState();
        var x = Math.floor((e.clientX - rect.left) * scaleX);
        var y = Math.floor((e.clientY - rect.top)  * scaleY);
        floodFill(x, y, hexToRgba(document.getElementById('colorPicker').value));
    } else if (isPenActive || isEraserActive) {
        saveCanvasState();
        drawing = true;
        ctx.beginPath();
        var x = (e.clientX - rect.left) * scaleX;
        var y = (e.clientY - rect.top)  * scaleY;
        ctx.moveTo(x, y);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }
}

function draw(e) {
    if (!drawing || (!isPenActive && !isEraserActive)) return;
    var rect   = canvas.getBoundingClientRect();
    var scaleX = canvas.width  / rect.width;
    var scaleY = canvas.height / rect.height;
    var x = (e.clientX - rect.left) * scaleX;
    var y = (e.clientY - rect.top)  * scaleY;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineTo(x, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y);
}

function stopDrawing() { drawing = false; ctx.beginPath(); }

canvas.addEventListener('mousedown',  startDrawing);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    stopDrawing);
canvas.addEventListener('mouseout',   stopDrawing);

// 觸控 — 照原始用 MouseEvent 包裝
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    startDrawing(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    draw(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
    e.preventDefault(); stopDrawing();
});

// ── 填色 ──────────────────────────────────────────
function hexToRgba(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16), 255];
}
function floodFill(startX, startY, fillColor) {
    var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var d = imgData.data, W = canvas.width, H = canvas.height;
    function getPixel(x, y) {
        if (x<0||y<0||x>=W||y>=H) return [-1,-1,-1,-1];
        var i=(y*W+x)*4; return [d[i],d[i+1],d[i+2],d[i+3]];
    }
    function colorsMatch(a,b){ return a[0]===b[0]&&a[1]===b[1]&&a[2]===b[2]&&a[3]===b[3]; }
    var startColor = getPixel(startX, startY);
    if (colorsMatch(startColor, fillColor)) return;
    var stack = [[startX, startY]];
    while (stack.length) {
        var p = stack.pop(), x = p[0], y = p[1];
        if (!colorsMatch(getPixel(x,y), startColor)) continue;
        var i=(y*W+x)*4; d[i]=fillColor[0];d[i+1]=fillColor[1];d[i+2]=fillColor[2];d[i+3]=fillColor[3];
        if (x>0)   stack.push([x-1,y]);
        if (x<W-1) stack.push([x+1,y]);
        if (y>0)   stack.push([x,y-1]);
        if (y<H-1) stack.push([x,y+1]);
    }
    ctx.putImageData(imgData, 0, 0);
}

// ── 歷史 ──────────────────────────────────────────
function saveCanvasState() {
    if (historyStack.length > 50) historyStack.shift();
    historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}
function undo() {
    if (historyStack.length > 0) { ctx.putImageData(historyStack.pop(), 0, 0); toast('已回復'); }
    else toast('沒有可回復的步驟');
}
function showClear() { document.getElementById('clearOverlay').classList.add('show'); }
function hideClear() { document.getElementById('clearOverlay').classList.remove('show'); }
function doClear() { saveCanvasState(); ctx.clearRect(0,0,canvas.width,canvas.height); hideClear(); toast('畫布已清除'); }

// ── 載入 overlay ──────────────────────────────────
function loadOverlay(src) {
    imageScale = 1; imageX = 0; imageY = 0; imageRotation = 0;
    imageOverlay.onload = function() {
        imageOverlay.style.display = 'block';
        imageOverlay.style.opacity = document.getElementById('opacityRange').value / 100;
        isImageVisible = true;
        imageOverlay.style.zIndex = '1';
        canvas.style.zIndex = '2';
        document.getElementById('toggleImgBtn').textContent = '👁 隱藏圖片';
        updateCanvasAndImagePosition();
        toast('✅ 圖片已載入，可調透明度描圖');
    };
    imageOverlay.onerror = function() {
        toast('❌ 圖片載入失敗');
    };
    imageOverlay.src = src;
}

function triggerFilePick() {
    document.getElementById('fileInput').click();
}

// ── 本機上傳 ───────────────────────────────────────
function handleFileUpload(event) {
    var file = event.target.files[0];
    if (!file) return;
    if (!/^image\//.test(file.type)) {
        toast('請選擇圖片檔案');
        event.target.value = '';
        return;
    }
    var reader = new FileReader();
    reader.onload = function(e) { loadOverlay(e.target.result); };
    reader.onerror = function() { toast('❌ 讀取圖片失敗'); };
    reader.readAsDataURL(file);
    event.target.value = '';
}

// ── overlay 控制 ──────────────────────────────────
function toggleOverlay() {
    isImageVisible = !isImageVisible;
    imageOverlay.style.display = isImageVisible ? 'block' : 'none';
    document.getElementById('toggleImgBtn').textContent = isImageVisible ? '👁 隱藏圖片' : '👁 顯示圖片';
}
function clearOverlayImage() {
    imageOverlay.src = '';
    imageOverlay.style.display = 'none';
    isImageVisible = false;
    imageScale = 1; imageX = 0; imageY = 0;
    setRotateDeg(0);
    document.getElementById('toggleImgBtn').textContent = '👁 隱藏圖片';
    toast('底圖已清除');
}
function setOpacity(val) {
    imageOverlay.style.opacity = val / 100;
    document.getElementById('opacityVal').textContent = val + '%';
}
function scaleImg(d) { imageScale = Math.max(0.1, Math.min(5, imageScale+d)); updateCanvasAndImagePosition(); }
function rotateImg(d) { setRotateDeg((imageRotation+d+360)%360); }
function setRotateDeg(deg) {
    deg = Math.max(0, Math.min(360, deg));
    imageRotation = deg;
    var r = document.getElementById('rotateRange');
    var n = document.getElementById('rotateDeg');
    if (r) r.value = deg;
    if (n) n.value = deg;
    updateCanvasAndImagePosition();
}
function moveImg(dx,dy) { imageX+=dx; imageY+=dy; updateCanvasAndImagePosition(); }
function resetImg() {
    imageScale=1; imageX=0; imageY=0;
    setRotateDeg(0);
    toast('已重置');
}

// ── 全螢幕 ──────────────────────────────────────────
function toggleFullscreen() {
    var btn = document.getElementById('fullscreenBtn');
    if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); btn.textContent='⛶ 退出全螢幕'; }
    else { document.exitFullscreen(); btn.textContent='⛶ 全螢幕'; }
}

// ── 儲存 ──────────────────────────────────────────
function saveWhite() {
    var tmp=document.createElement('canvas'); tmp.width=canvas.width; tmp.height=canvas.height;
    var tc=tmp.getContext('2d'); tc.fillStyle='white'; tc.fillRect(0,0,tmp.width,tmp.height); tc.drawImage(canvas,0,0);
    dlFile(tmp.toDataURL('image/png'),'latte_white.png'); toast('✅ 已下載（白色背景）');
}
function saveTrans() { dlFile(canvas.toDataURL('image/png'),'latte_transparent.png'); toast('✅ 已下載（透明背景）'); }
function dlFile(u,n){ var a=document.createElement('a'); a.download=n; a.href=u; a.click(); }

// ── AI 生圖 ──────────────────────────────────────────
function toggleChip(btn, style) {
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) activeChips.push(style);
    else activeChips = activeChips.filter(function(s){ return s!==style; });
}

function updateAiImportLabel() {
    var btn = document.getElementById('aiImportBtn');
    var mode = document.getElementById('aiMode').value;
    btn.textContent = mode === 'draw' ? '↙ 繪製到畫布（會輸出）' : '↙ 匯入為參考底圖（不會輸出）';
}

async function generateImage() {
    var pt = document.getElementById('aiPrompt').value.trim();
    if (!pt) { toast('請輸入圖片描述'); return; }
    var btn=document.getElementById('generateBtn'), status=document.getElementById('aiStatus');
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 生成中...';
    status.textContent='正在生成圖片，請稍候...';
    document.getElementById('aiPreview').style.display='none';
    document.getElementById('aiImportBtn').style.display='none';
    aiImageData=null;
    var full = pt + (activeChips.length ? ', '+activeChips.join(', ') : '');
    var asp=document.getElementById('aiAspect').value, w=512, h=512;
    if(asp==='9:16'){w=512;h=910;} else if(asp==='16:9'){w=910;h=512;} else if(asp==='3:4'){w=512;h=682;}
    var url=GAS_URL+'?prompt='+encodeURIComponent(full)+'&width='+w+'&height='+h+'&seed='+Math.floor(Math.random()*999999)+'&model=gptimage';
    try {
        var resp = await Promise.race([fetch(url), new Promise(function(_,r){setTimeout(function(){r(new Error('逾時，請重試'));},60000);})]);
        if (!resp.ok) throw new Error('網路錯誤 '+resp.status);
        var data = await resp.json();
        if (!data.success) throw new Error(data.error||'生成失敗');
        aiImageData = data.image;
        var pv=document.getElementById('aiPreview'); pv.src=aiImageData; pv.style.display='block';
        document.getElementById('aiImportBtn').style.display='block';
        status.textContent='✅ 生成完成！可匯入為參考底圖描圖，匯出時不會帶出底圖。';
        updateAiImportLabel();
        toast('✅ AI 圖片生成完成！');
    } catch(err) {
        status.textContent='❌ '+err.message; toast('生成失敗：'+err.message);
    } finally {
        btn.disabled=false; btn.innerHTML='🎨 生成圖片';
    }
}

function importAiImage() {
    if (!aiImageData) { toast('尚無生成圖片'); return; }
    updateAiImportLabel();
    if (document.getElementById('aiMode').value === 'draw') {
        var img=new Image();
        img.onload=function(){
            saveCanvasState();
            var op=ctx.globalCompositeOperation; ctx.globalCompositeOperation='source-over';
            // 保持比例，置中繪製
            var cw=canvas.width,ch=canvas.height,iw=img.width,ih=img.height;
            var r=Math.min(cw/iw,ch/ih);
            ctx.drawImage(img,(cw-iw*r)/2,(ch-ih*r)/2,iw*r,ih*r);
            ctx.globalCompositeOperation=op;
            toast('✅ 已繪製到畫布');
        };
        img.src=aiImageData;
    } else {
        loadOverlay(aiImageData);
    }
}

// ── Google Drive 圖片瀏覽器（不需登入，使用 API Key）──
var GDRIVE_API_KEY   = 'AIzaSyDudzSa5IVs9y0DsI9Uqs1QuXQqpzoz6V4';
var GDRIVE_FOLDER_ID = '1rN1BHTJAJiHpmSYj0YmAkplmZbxXANFY';
var driveImagesLoaded = false;

function openDriveBrowser() {
    document.getElementById('driveBrowserOverlay').classList.add('show');
    if (!driveImagesLoaded) loadDriveImages();
}

function closeDriveBrowser() {
    document.getElementById('driveBrowserOverlay').classList.remove('show');
}

// 點擊背景關閉
document.getElementById('driveBrowserOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDriveBrowser();
});

function loadDriveImages() {
    var grid   = document.getElementById('driveBrowserGrid');
    var status = document.getElementById('driveBrowserStatus');
    grid.innerHTML = '';
    status.textContent = '⏳ 載入圖片中...';

    var url = 'https://www.googleapis.com/drive/v3/files'
        + '?q=' + encodeURIComponent("'" + GDRIVE_FOLDER_ID + "' in parents and mimeType contains 'image/' and trashed=false")
        + '&fields=files(id,name,thumbnailLink,mimeType)'
        + '&pageSize=50'
        + '&key=' + GDRIVE_API_KEY;

    fetch(url)
        .then(function(r) {
            if (!r.ok) throw new Error('API 錯誤 ' + r.status);
            return r.json();
        })
        .then(function(data) {
            var files = data.files || [];
            if (files.length === 0) {
                status.textContent = '資料夾內沒有圖片';
                return;
            }
            files.forEach(function(file) {
                var thumb = document.createElement('div');
                thumb.className = 'drive-thumb';
                thumb.title = file.name;

                var img = document.createElement('img');
                // thumbnailLink 是縮圖，不需授權即可載入
                img.src = file.thumbnailLink
                    ? file.thumbnailLink.replace('=s220', '=s400')
                    : 'https://via.placeholder.com/200?text=No+Preview';
                img.alt = file.name;
                img.loading = 'lazy';

                var nameEl = document.createElement('div');
                nameEl.className = 'drive-thumb-name';
                nameEl.textContent = file.name;

                thumb.appendChild(img);
                thumb.appendChild(nameEl);
                thumb.addEventListener('click', function() {
                    selectDriveImage(file.id, file.name, file.thumbnailLink);
                });
                grid.appendChild(thumb);
            });
            driveImagesLoaded = true;
            status.textContent = '共 ' + files.length + ' 張圖片，點選即可匯入';
        })
        .catch(function(err) {
            status.textContent = '❌ 載入失敗：' + err.message;
        });
}

function selectDriveImage(fileId, fileName, thumbnailLink) {
    var status = document.getElementById('driveBrowserStatus');
    status.textContent = '⏳ 載入「' + fileName + '」...';

    var mode = document.getElementById('aiMode').value;

    // 用高解析縮圖（=s1600），不會有 CORS 問題
    var thumbUrl = thumbnailLink
        ? thumbnailLink.replace(/=s\d+/, '=s1600')
        : null;

    if (!thumbUrl) {
        status.textContent = '❌ 此圖片沒有可用的縮圖';
        return;
    }

    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
        if (mode === 'draw') {
            saveCanvasState();
            var op = ctx.globalCompositeOperation;
            ctx.globalCompositeOperation = 'source-over';
            var cw=canvas.width, ch=canvas.height, iw=img.width, ih=img.height;
            var r = Math.min(cw/iw, ch/ih);
            ctx.drawImage(img, (cw-iw*r)/2, (ch-ih*r)/2, iw*r, ih*r);
            ctx.globalCompositeOperation = op;
            toast('✅ 已繪製到畫布');
        } else {
            var tmp = document.createElement('canvas');
            tmp.width = img.width; tmp.height = img.height;
            tmp.getContext('2d').drawImage(img, 0, 0);
            loadOverlay(tmp.toDataURL('image/png'));
        }
        closeDriveBrowser();
        status.textContent = '共載入完成';
    };
    img.onerror = function() {
        status.textContent = '❌ 載入失敗，請確認資料夾已設為「知道連結的人都可以檢視」';
        toast('❌ 圖片載入失敗');
    };
    img.src = thumbUrl;
}

// ── 側欄收合 ──────────────────────────────────────
function togglePanel(side) {
    if (side === 'toolbar') {
        var el      = document.getElementById('toolbar');
        var btn     = document.getElementById('toolbarToggle');
        var recall  = document.getElementById('toolbarRecall');
        var collapsed = el.classList.toggle('collapsed');
        btn.textContent = collapsed ? '▶' : '◀';
        recall.style.display = collapsed ? 'flex' : 'none';
    } else {
        var el      = document.getElementById('controls');
        var btn     = document.getElementById('controlsToggle');
        var recall  = document.getElementById('controlsRecall');
        var collapsed = el.classList.toggle('collapsed');
        btn.textContent = collapsed ? '◀' : '▶';
        recall.style.display = collapsed ? 'flex' : 'none';
    }
    setTimeout(updateCanvasAndImagePosition, 280);
}
var toastTimer;
function toast(msg) {
    var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){ el.classList.remove('show'); },2800);
}

// 觸控縮放防止
document.addEventListener('touchmove', function(e){ if(e.scale!==1) e.preventDefault(); }, { passive:false });
var lastTouch=0;
document.addEventListener('touchend', function(e){ var n=Date.now(); if(n-lastTouch<=300) e.preventDefault(); lastTouch=n; }, false);
</script>
